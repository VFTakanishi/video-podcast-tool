<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビデオポッドキャスト収録</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">ブラウザ収録ツール</p>
        <h1>ビデオポッドキャスト収録</h1>
        <p class="lead">
          録画、停止、MP4保存、画面共有、背景そのまま、背景ぼかし、画像背景に対応した
          シンプルな日本語アプリです。
        </p>
      </div>
      <div class="status-card">
        <p class="status-label">状態</p>
        <p id="statusText" class="status-text">開始準備中</p>
      </div>
    </section>

    <section class="studio">
      <div class="preview-panel">
        <canvas id="previewCanvas" width="1280" height="720" aria-label="収録プレビュー"></canvas>
        <div class="preview-badge" id="recordingBadge" hidden>録画中 00:00</div>
      </div>

      <aside class="controls">
        <div class="control-group">
          <h2>基本操作</h2>
          <button id="setupButton" class="primary">カメラとマイクを開始</button>
          <button id="recordButton">録画</button>
          <button id="stopButton" disabled>停止</button>
          <button id="saveButton" disabled>保存</button>
        </div>

        <div class="control-group">
          <h2>マイク</h2>
          <label class="field">
            <span>入力デバイス</span>
            <select id="microphoneSelect">
              <option value="">標準マイク</option>
            </select>
          </label>
          <p class="hint">Bluetoothマイクを使うときは、ここで選んでから開始してください。</p>
        </div>

        <div class="control-group">
          <h2>画面共有</h2>
          <button id="shareButton">画面共有を開始</button>
        </div>

        <div class="control-group">
          <h2>背景</h2>
          <label class="field">
            <span>背景モード</span>
            <select id="backgroundMode">
              <option value="none">背景そのまま</option>
              <option value="blur">背景ぼかし</option>
              <option value="image">画像背景</option>
            </select>
          </label>
          <label class="field">
            <span>背景画像</span>
            <input id="backgroundImageInput" type="file" accept="image/*">
          </label>
          <p class="hint">画像を選ぶと自動で画像背景へ切り替わります。</p>
        </div>

        <div class="control-group">
          <h2>保存形式</h2>
          <p class="hint">保存時にYouTube向けのMP4を優先して保存します。</p>
        </div>
      </aside>
    </section>
  </main>

  <video id="cameraVideo" autoplay playsinline muted hidden></video>
  <video id="screenVideo" autoplay playsinline muted hidden></video>
  <canvas id="cameraCanvas" width="1280" height="720" hidden></canvas>
  <canvas id="personCanvas" width="1280" height="720" hidden></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
